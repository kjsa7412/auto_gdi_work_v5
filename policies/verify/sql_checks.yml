version: "1.0"
scope: verify.sql
checks:
  - id: VSQL-001
    name: "실행순서 명시"
    check: "execution_order.md exists"
    severity: warning
  - id: VSQL-002
    name: "서브화면 메뉴 미등록"
    check: "sub-screen has no sy_menu_info INSERT"
    severity: critical
  - id: VSQL-003
    name: "감사컬럼 8개"
    check: "DDL includes all 8 audit columns"
    severity: critical
  - id: VSQL-004
    name: "pgm_path 소문자"
    check: "pgm_path uses lowercase, no /project prefix"
    severity: critical
  - id: VSQL-005
    name: "menu_id MAX+1 채번"
    check: "menu_id not hardcoded, uses MAX+1 pattern"
    severity: critical
  - id: VSQL-006
    name: "감사컬럼명 DDL 정합성 검증"
    check: >
      SQL INSERT/UPDATE의 감사컬럼명이 대상 테이블 DDL의 실제 컬럼명과 정확히 일치하는지 검증.
      DDL 기준 정확한 컬럼명: firs_reg_pgm_id, firs_reg_dts, firs_reg_user_id, firs_reg_ip,
      fina_reg_pgm_id, fina_reg_dts, fina_reg_user_id, fina_reg_ip.
      유사 변형(frst_reg_*, first_reg_*, fist_reg_* 등) 자동 감지 및 차단.
    severity: critical
    auto_fix: true
    auto_fix_action: "DDL에서 Grep한 정확한 컬럼명으로 치환"
  - id: VSQL-007
    name: "메뉴등록 SQL 감사컬럼 DDL 대조"
    check: >
      sy_pgm_info, sy_menu_info INSERT 시 감사컬럼명을 에이전트가 추론하지 않고
      DDL(테이블_DDL.txt)에서 확인된 정확한 컬럼명을 사용하는지 검증.
    severity: critical
    auto_fix: true
    auto_fix_action: "DDL 기준 컬럼명으로 자동 교정"
  - id: VSQL-008
    name: "메뉴등록 SQL UPSERT 패턴 필수"
    check: >
      sy_pgm_info, sy_menu_info에 INSERT 시 반드시 ON CONFLICT DO UPDATE 패턴 사용.
      sy_pgm_info: ON CONFLICT (pgm_id)
      sy_menu_info: ON CONFLICT (menu_mdul_id, menu_id)
      단순 INSERT만 존재하면 검증 실패.
    severity: critical
    auto_fix: false
  - id: VSQL-009
    name: "UPSERT UPDATE SET 감사컬럼 규칙"
    check: >
      ON CONFLICT DO UPDATE SET에 fina_reg_pgm_id, fina_reg_dts, fina_reg_user_id, fina_reg_ip 포함 필수.
      firs_reg_* 컬럼은 UPDATE SET에 포함 금지 (최초 등록 정보 보존).
    severity: critical
    auto_fix: false
  - id: VSQL-010
    name: "comm_cd 값 형식 검증"
    check: "sy_code_dtl INSERT 시 comm_cd 값이 3자리 숫자 코드(예: '010')인지 확인. wrk_tp_cd나 cd_tp_cd 접두사가 포함되면 안 됨 (예: 'RP080010' 금지)"
    severity: critical
    auto_fixable: true
  - id: VSQL-011
    name: "신규 코드그룹 기존 충돌 검증"
    check: "sy_code_mst INSERT 시 해당 wrk_tp_cd+cd_tp_cd가 convention 코드_업무구분.txt에 이미 존재하는지 Grep 확인. 기존 코드그룹과 용도가 다르면 등록 차단하고 미사용 번호를 찾아 재할당"
    severity: critical
  - id: VSQL-012
    name: "SQL 파일 컬럼 DDL 전수 일치"
    check: >
      메뉴등록, DDL보완, 코드등록 등 모든 SQL 파일에서 INSERT/UPDATE하는 컬럼이
      해당 테이블 DDL에 실제 존재하는지 전수 검증.
      DDL에 없는 컬럼 사용 시 즉시 차단 (pgm_tp_cd 등 존재하지 않는 컬럼 금지).
      XML 내 SQL뿐 아니라 별도 .sql 파일에도 동일 기준 적용.
    severity: critical
    auto_fixable: false
  - id: VSQL-013
    name: "PostgreSQL 문법 전용 (SQL 파일)"
    check: >
      별도 SQL 파일(.sql)도 PostgreSQL 문법만 허용:
      1. CAST(... AS UNSIGNED) 금지 → CAST(... AS BIGINT) 사용
      2. AUTO_INCREMENT 금지
      3. ENGINE= 금지
      4. DELIMITER 금지
      5. BEGIN...END 트리거 → CREATE FUNCTION $$ LANGUAGE plpgsql + CREATE TRIGGER EXECUTE FUNCTION
      6. DATE_FORMAT 금지 → TO_CHAR 사용
      7. IFNULL 금지 → COALESCE 사용
    severity: critical
