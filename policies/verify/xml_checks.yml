version: "1.0"
scope: verify.xml
checks:
  - id: VX-001
    name: "namespace 소문자"
    check: "mapper namespace is lowercase"
    severity: critical
  - id: VX-002
    name: "resultType 확인"
    check: 'resultType="java.util.Map"'
    severity: critical
  - id: VX-003
    name: "comp_cd/brndz_cd 미사용"
    check: "no comp_cd or brndz_cd in any statement"
    severity: critical
  - id: VX-004
    name: "INSERT 감사컬럼"
    check: "firs_reg_pgm_id, firs_reg_dts, firs_reg_user_id, firs_reg_ip present"
    severity: critical
  - id: VX-005
    name: "UPDATE 감사컬럼"
    check: "fina_reg_pgm_id, fina_reg_dts, fina_reg_user_id, fina_reg_ip present"
    severity: critical
  - id: VX-006
    name: "current_timestamp 사용"
    check: "no now() calls"
    severity: critical
  - id: VX-007
    name: "_dts 접미사"
    check: "no _dtm suffix columns"
    severity: critical
  - id: VX-008
    name: "DDL 컬럼 전수 일치"
    check: "all columns exist in DDL"
    severity: critical
  - id: VX-009
    name: "login_comp_cd 미사용"
    check: "no login_comp_cd parameter"
    severity: critical
  - id: VX-010
    name: "namespace 대소문자 자동 교정"
    check: "if namespace contains uppercase, auto-lowercase"
    severity: critical
    auto_fix: true
    auto_fix_action: "namespace를 소문자로 자동 변환"
  - id: VX-011
    name: "PostgreSQL 집계함수 내 윈도우함수 금지"
    check: "집계함수(STRING_AGG, ARRAY_AGG, SUM, COUNT 등) 내부에 윈도우함수(OVER, PARTITION BY)를 포함하지 않는지 검사"
    severity: critical
    auto_fixable: true
    auto_fix_action: "서브쿼리에서 GROUP BY로 먼저 집계한 후 외부에서 STRING_AGG 적용"
  - id: VX-012
    name: "PostgreSQL 문법 호환성"
    check: >
      PostgreSQL에서 금지되는 SQL 패턴 검사:
      1. 집계함수 내 윈도우함수 중첩 금지 (예: STRING_AGG(... COUNT(*) OVER(...) ...))
      2. 집계함수 내 집계함수 중첩 금지 (예: SUM(COUNT(...)))
      3. STRING_AGG 사용 시 ORDER BY가 필요하면 STRING_AGG(expr, sep ORDER BY ...) 형태 사용
      4. CAST 대신 ::type 캐스팅도 허용하되, MyBatis XML에서는 CAST 권장 (#{} 충돌 방지)
    severity: critical
  - id: VX-013
    name: "코드명 서브쿼리 컬럼명 검증"
    check: "sy_code_dtl 서브쿼리에서 코드명 컬럼은 반드시 comm_cd_nm을 사용. cd_nm, code_nm 등 존재하지 않는 컬럼 사용 금지"
    severity: critical
    auto_fixable: true
    auto_fix_action: "cd_nm → comm_cd_nm, code_nm → comm_cd_nm 자동 치환"
  - id: VX-014
    name: "MyBatis 태그 내 단일 SQL문 강제"
    check: "하나의 <select>/<insert>/<update>/<delete> 태그 내에 세미콜론(;)으로 분리된 복수 SQL문 사용 금지. cascade 삭제 등은 별도 statement로 분리하고 HTML에서 saveAll 패턴으로 순서 보장"
    severity: critical
    auto_fixable: false
  - id: VX-015
    name: "PostgreSQL 전용 문법 강제"
    check: >
      모든 SQL은 PostgreSQL 문법으로 작성:
      1. 문자열 연결: CONCAT() 또는 || 연산자 (+ 연산자 금지)
      2. 타입 캐스팅: CAST(x AS type) 또는 x::type
      3. 날짜함수: current_timestamp, current_date, TO_CHAR(), TO_DATE()
      4. 자동증가: SERIAL/BIGSERIAL 또는 CTE 기반 채번 (AUTO_INCREMENT 금지)
      5. 페이징: LIMIT/OFFSET (TOP, ROWNUM 금지)
      6. 불리언: true/false (1/0 금지)
      7. UPSERT: WITH ... UPDATE ... RETURNING * / INSERT WHERE NOT EXISTS 패턴
      8. IFNULL 금지 → COALESCE 사용
      9. DATE_FORMAT 금지 → TO_CHAR 사용
      10. ISNULL 금지 → IS NULL 사용
    severity: critical
