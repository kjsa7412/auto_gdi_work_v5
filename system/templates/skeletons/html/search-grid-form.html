<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{frame/top_title_button :: topTitleButtonFragment}"></th:block>

<div class="data-page">
    <div th:id="|${PGM}searchForm|"></div>
    <div class="data-content-wrapper">
        <div class="data-content-fill">
            <div th:id="|${PGM}toolbar1|"></div>
            <div class="data-grid" th:id="|${PGM}grid1|"></div>
        </div>
        <div class="data-content-half-left">
            <div th:id="|${PGM}toolbar2|"></div>
            <div th:id="|${PGM}postForm|"></div>
        </div>
    </div>
</div>

<script type="text/javascript" th:inline="javascript">
    (() => {
        const PGM = /*[[${PGM}]]*/ null;
        const listener = platform.listener[PGM];

        /* 상태 변수 */
        let currentMode = null;

        // ──────────────────────────────────────
        // 상태 초기화
        // ──────────────────────────────────────
        const resetState = () => {
            currentMode = null;
            /* TODO: 추가 상태 변수 초기화 */
        };

        // ──────────────────────────────────────
        // 조회 폼 생성
        // ──────────────────────────────────────
        const createSearchForm = () => {
            listener.form.searchForm = webix.ui({
                container: `${PGM}searchForm`,
                view: 'dataForm',
                pgm: PGM,
                search: true,
                elements: [
                    {
                        cols: [
                            /* TODO: 조회 필드 정의 — 한 줄 5칸 기준
                            { view: DATA_VIEW.text, label: '필드명', name: 'P_field_nm' },
                            { view: DATA_VIEW.codeNone, type: DATA_CODE_TYPE.codeValue, label: '코드명',
                              name: 'P_code_cd', param: { wrk_tp_cd: 'XX', cd_tp_cd: 'YYY' } },
                            { view: DATA_VIEW.date, label: '시작일', name: 'P_start_dt' },
                            {},
                            {},
                            */
                        ],
                    },
                ],
            });
        };

        // ──────────────────────────────────────
        // 툴바 + 그리드 생성
        // ──────────────────────────────────────
        const createToolbarsAndGrids = () => {
            /* 목록 툴바 */
            listener.toolbar.toolbar1 = webix.ui({
                container: `${PGM}toolbar1`,
                view: "dataToolbar",
                pgm: PGM,
                title: '목록', /* TODO: 목록 제목 */
            });

            /* 목록 그리드 */
            listener.grid.grid1 = webix.ui({
                container: `${PGM}grid1`,
                view: "datagrid",
                listener: listener,
                editable: false,
                checkable: false, /* TODO: 다건 삭제 시 true */
                columns: [
                    /* TODO: 그리드 컬럼 정의
                    { id: "col1", editor: GRID_VIEW.text, header: "컬럼1", sort: "string", css: "textCenter", adjust: true },
                    { id: "col2", editor: GRID_VIEW.number, header: "금액", sort: "int", css: "textRight", format: priceFormat, adjust: true },
                    */
                ],
            });

            /* 상세 툴바 */
            listener.toolbar.toolbar2 = webix.ui({
                container: `${PGM}toolbar2`,
                view: "dataToolbar",
                pgm: PGM,
                title: '상세', /* TODO: 상세 제목 */
            });
        };

        // ──────────────────────────────────────
        // 상세 폼 생성
        // ──────────────────────────────────────
        const createPostForm = () => {
            listener.form.postForm = webix.ui({
                container: `${PGM}postForm`,
                view: 'dataForm',
                pgm: PGM,
                elements: [
                    {
                        cols: [
                            /* TODO: 상세 필드 정의
                            { view: DATA_VIEW.text, label: '필드명', name: 'field_nm', required: true, maxlength: 50 },
                            { view: DATA_VIEW.codeNone, type: DATA_CODE_TYPE.codeValue, label: '코드명',
                              name: 'code_cd', param: { wrk_tp_cd: 'XX', cd_tp_cd: 'YYY' } },
                            { view: DATA_VIEW.textarea, label: '비고', name: 'rmk', height: 200 },
                            { view: DATA_VIEW.text, name: 'pk_field', hidden: true },
                            */
                        ],
                    },
                ],
            });
        };

        // ──────────────────────────────────────
        // 이벤트 핸들러
        // ──────────────────────────────────────

        /* 초기화 */
        const onInitClick = () => {
            listener.form.searchForm.formReset();
            listener.form.postForm.formReset();
            listener.form.postForm.formReadonly(true);
            listener.grid.grid1.clearData();
            resetState();
        };

        /* 조회 */
        const onSearchClick = () => {
            selectGrid();
        };

        /* 신규 */
        const onNewClick = () => {
            listener.form.postForm.formReset();
            listener.form.postForm.formReadonly(false);
            currentMode = EDIT_MODE.NEW;
            /* TODO: 신규 시 기본값 세팅 */
        };

        /* 저장 */
        const onSaveClick = () => {
            if (!listener.form.postForm.formValidate()) return;

            popup.confirm.show('저장 하시겠습니까?', (result) => {
                if (!result) return;

                let param = listener.form.postForm.getData();

                if (currentMode === EDIT_MODE.NEW) {
                    param.statement = "/* TODO: namespace */.insert/* TODO: Subject */";
                } else {
                    param.statement = "/* TODO: namespace */.update/* TODO: Subject */";
                }

                platform.post(platform.url.save, param, new Callback((res) => {
                    if (res.resultCode === RESULT_CODE.OK) {
                        if (res.resultData === 0) {
                            popup.alert.show('저장에 실패하였습니다. 데이터를 확인해주세요.');
                            return;
                        }
                        popup.alert.show('저장되었습니다.', () => { onSearchClick(); });
                    } else if (res.resultCode === RESULT_CODE.ERROR) {
                        popup.alert.show(res.resultMessage || '저장 중 문제가 발생되었습니다.');
                    }
                }));
            });
        };

        /* 삭제 */
        const onDeleteClick = () => {
            /* TODO: 단건 삭제 또는 다건 삭제 패턴 선택 */
            const checked = listener.grid.grid1.getCheckedData();
            if (!checked?.length) {
                popup.alert.show('삭제할 데이터를 선택해주세요.');
                return;
            }

            popup.confirm.show('삭제 하시겠습니까?', (result) => {
                if (!result) return;

                const list = checked.map(item => ({
                    /* TODO: PK 필드 매핑 */
                }));

                const param = new Param();
                param.add('/* TODO: namespace */.delete/* TODO: Subject */', list);

                platform.post(platform.url.saveAll, param.data, new Callback((res) => {
                    if (res.resultCode === RESULT_CODE.OK) {
                        popup.alert.show('삭제되었습니다.', () => { onSearchClick(); });
                    } else if (res.resultCode === RESULT_CODE.ERROR) {
                        popup.alert.show(res.resultMessage || '삭제 중 문제가 발생되었습니다.');
                    }
                }));
            });
        };

        // ──────────────────────────────────────
        // 데이터 조회
        // ──────────────────────────────────────

        /* 목록 조회 */
        const selectGrid = () => {
            if (!listener.form.searchForm.formValidate()) return;
            resetState();

            let param = listener.form.searchForm.getData();
            param.statement = "/* TODO: namespace */.select/* TODO: Subject */List";

            const callback = new Callback(function (result) {
                if (result.resultCode === RESULT_CODE.OK) {
                    listener.grid.grid1.setData(result.resultData);
                    listener.form.postForm.formReset();
                    listener.form.postForm.formReadonly(true);
                } else if (result.resultCode === RESULT_CODE.ERROR) {
                    popup.alert.show(result.resultMessage || "문제가 발생되었습니다.");
                }
            });

            platform.post(platform.url.select, param, callback);
        };

        /* 단건 상세 조회 */
        const selectInfo = (pkValue) => {
            let param = { /* TODO: PK 파라미터 */ };
            param.statement = "/* TODO: namespace */.select/* TODO: Subject */Info";

            platform.post(platform.url.select, param, new Callback((result) => {
                if (result.resultCode === RESULT_CODE.OK && result.resultData) {
                    const data = Array.isArray(result.resultData) ? result.resultData[0] : result.resultData;
                    listener.form.postForm.setData(data);
                    listener.form.postForm.formReadonly(false, [/* TODO: PK 필드명 */]);
                    currentMode = EDIT_MODE.EDIT;
                }
            }));
        };

        // ──────────────────────────────────────
        // Assign Handlers
        // ──────────────────────────────────────
        listener.initPgm = () => {
            resetState();
            createSearchForm();
            createPostForm();
            createToolbarsAndGrids();
            listener.form.postForm.formReadonly(true);
        };

        listener.activePgm = (param, isNew) => {
            /* 서브화면 복귀 시 자동 재조회 */
            if (listener.grid.grid1.count() > 0) {
                selectGrid();
            }
            listener.form.searchForm.focus();
        };

        /* 표준 버튼 바인딩 */
        listener.button.init.click = onInitClick;
        listener.button.search.click = onSearchClick;
        listener.button.news.click = onNewClick;
        listener.button.save.click = onSaveClick;
        listener.button.del.click = onDeleteClick;

        /* TODO: 커스텀 버튼 바인딩 (PPT 버튼명이 표준 라벨과 불일치 시)
        listener.button.etc1.click = onCustomClick;
        */

        /* 그리드 행 클릭 → 상세 폼 세팅 */
        listener.gridRow.click = (record, grid) => {
            listener.form.postForm.setData(record);
            listener.form.postForm.formReadonly(false, [/* TODO: PK 필드명 */]);
            currentMode = EDIT_MODE.EDIT;
        };

        /* TODO: 그리드 더블클릭 → 서브화면 이동 (필요 시)
        listener.gridRow.dblclick = (row, column, record, grid) => {
            APP_PGM.openPgm('모듈ID', '화면ID', { pk_field: record.pk_field });
        };
        */

        /* TODO: 에디터 변경 이벤트 (필요 시)
        listener.editor.change = (el) => {
            if (el.config.name === 'field_cd') {
                const formData = listener.form.postForm.getData();
                // 로직 처리
            }
        };
        */

        /* 그리드 에디터 변경 (필요 시) */
        listener.gridEditor.changed = (grid, state, editor) => {};
        listener.gridRow.addRow = () => {};
    })();
</script>
</html>
