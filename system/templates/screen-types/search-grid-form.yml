version: "1.0"
screen_type: search-grid-form
description: "조회영역 + 그리드 + 상세폼 (마스터디테일)"
match_conditions:
  - has_search_area: true
  - has_grid: true
  - has_detail_form: true
  - grid_count: 1
  - form_count: 2  # searchForm + postForm

layout:
  html_class: "data-content-wrapper"
  sections:
    - type: search_form
      container: searchForm
    - type: content_half_left
      children:
        - type: toolbar
          container: toolbar1
        - type: grid
          container: grid1
          css_class: data-grid
    - type: content_half_right
      children:
        - type: toolbar
          container: toolbar2
        - type: form
          container: postForm

skeleton:
  html: "skeletons/html/search-grid-form.html"
  xml: "skeletons/xml/standard-crud.xml"
  controller: null   # 기본값: CommonController 사용. CG-002 조건 해당 시에만 skeleton 지정
  service: null      # 기본값: CommonService 사용. CG-002 조건 해당 시에만 skeleton 지정
  controller_skeleton: "skeletons/controller/standard-controller.java"   # 커스텀 필요 시 사용할 skeleton
  service_skeleton: "skeletons/service/standard-service.java"            # 커스텀 필요 시 사용할 skeleton

required_functions:
  - resetState
  - createSearchForm
  - createToolbarsAndGrids
  - createPostForm
  - onInitClick
  - onSearchClick
  - onSaveClick
  - selectGrid
  - assignHandlers

required_listeners:
  - initPgm
  - activePgm
  - button.init.click
  - button.search.click
  - button.save.click
  - gridRow.click

auto_generation: true
confidence_threshold: 0.8
