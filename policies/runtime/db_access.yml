version: "1.0"
scope: runtime
description: "DB 직접 접근 정책 — convention 캐시로 확인 불가능한 정보의 실시간 조회 허용"

# ─────────────────────────────────────────────
# DB 접속 정보
# ─────────────────────────────────────────────
connection:
  host: "10.10.1.100"
  port: 5466
  database: "GDI_SERVICE"
  user: "sjinc"
  password: "sjinc12#$"
  tool: "psql"  # PGPASSWORD 환경변수 + psql CLI 사용

# ─────────────────────────────────────────────
# 접근 등급 정의
# ─────────────────────────────────────────────
access_levels:
  sync:
    description: "convention 캐시 전체 갱신 (analyze PHASE 1 전용)"
    allowed_operations: [SELECT, COPY]
    scope: "convention 대상 테이블 전체"
    output: "system/cache/convention/*.txt"
    steps: [analyze]

  lookup:
    description: "convention에서 확인 불가능한 정보의 실시간 단건/소량 조회"
    allowed_operations: [SELECT]
    scope: "해당 step에서 필요한 테이블/뷰에 한정"
    output: "조회 결과를 해당 step의 산출물에 직접 반영 (별도 파일 생성 금지)"
    steps: [analyze, build, test, fix]

# ─────────────────────────────────────────────
# lookup 접근 규칙
# ─────────────────────────────────────────────
rules:
  - id: DB-001
    description: "convention 우선 원칙 — DB 직접 조회 전 반드시 convention Grep 선행"
    condition: "DB lookup 요청 시"
    action: "convention Grep 결과가 불충분할 때만 DB 직접 조회 허용"
    severity: critical

  - id: DB-002
    description: "SELECT만 허용 — INSERT/UPDATE/DELETE/DDL 실행 금지"
    condition: "DB lookup 실행 시"
    action: "SELECT 문만 실행. 데이터 변경 쿼리 절대 금지"
    severity: critical

  - id: DB-003
    description: "조회 범위 제한 — 해당 task/screen에 관련된 테이블만 조회"
    condition: "DB lookup 실행 시"
    action: "manifest의 관련 테이블 범위 내에서만 조회. 무관한 테이블 접근 금지"
    severity: critical

  - id: DB-004
    description: "조회 사유 기록 필수"
    condition: "DB lookup 실행 시"
    action: "조회 사유를 산출물(spec, manifest, report 등)에 기록"
    severity: warning

  - id: DB-005
    description: "대량 조회 금지 — 단건 또는 소량 확인 목적만 허용"
    condition: "DB lookup 실행 시"
    action: "LIMIT 없는 대량 SELECT 금지. 확인 목적의 소량 조회만 허용"
    severity: critical

  - id: DB-006
    description: "뷰(VIEW) 조회 허용 — convention 캐시에 포함되지 않는 뷰 정보 실시간 확인"
    condition: "VIEW 구조 또는 VIEW 데이터 확인 필요 시"
    action: "information_schema.views, pg_views 등으로 뷰 정의 확인 가능"
    severity: info

  - id: DB-007
    description: "convention 미포함 메타데이터 조회 허용"
    condition: "인덱스, 트리거, 시퀀스, 제약조건 등 DDL 캐시에 없는 메타 확인 필요 시"
    action: "information_schema 또는 pg_catalog 조회 허용"
    severity: info

# ─────────────────────────────────────────────
# step별 허용 범위
# ─────────────────────────────────────────────
step_permissions:
  analyze:
    sync: true
    lookup: true
    typical_uses:
      - "뷰 구조 확인 (information_schema.views)"
      - "컬럼 상세 확인 (information_schema.columns)"
      - "트리거 존재 여부 확인 (information_schema.triggers)"
      - "코드값 실데이터 확인 (sy_code_dtl WHERE 조건)"
      - "테이블 관계/외래키 확인"

  build:
    sync: false
    lookup: true
    typical_uses:
      - "뷰 정의 확인 (SELECT 쿼리 기반 코드 생성)"
      - "실제 데이터 패턴 확인 (코드값 형식, NULL 비율 등)"
      - "시퀀스 존재/현재값 확인"
      - "인덱스 구조 확인 (쿼리 최적화)"

  test:
    sync: false
    lookup: true
    typical_uses:
      - "테스트 데이터 존재 확인"
      - "실제 데이터 상태 확인 (테스트 전제조건 검증)"
      - "뷰 조회 결과 검증"

  fix:
    sync: false
    lookup: true
    typical_uses:
      - "오류 원인 파악 (실제 데이터/구조 확인)"
      - "수정 전후 데이터 비교"
      - "누락 컬럼/인덱스/트리거 확인"

# ─────────────────────────────────────────────
# 실행 방법
# ─────────────────────────────────────────────
execution:
  command_template: "PGPASSWORD='{password}' psql -h {host} -p {port} -U {user} -d {database} -t -A -c \"{sql}\""
  notes:
    - "결과는 stdout으로 반환, 별도 파일 저장하지 않음 (sync 제외)"
    - "타임아웃: 10초 이내 완료 가능한 쿼리만 허용"
    - "convention 갱신(sync)은 analyze PHASE 1에서만 수행"

# ─────────────────────────────────────────────
# 금지사항
# ─────────────────────────────────────────────
forbidden:
  - "INSERT, UPDATE, DELETE, TRUNCATE, DROP, ALTER, CREATE 실행"
  - "convention Grep 없이 바로 DB 조회"
  - "해당 task/screen과 무관한 테이블 조회"
  - "LIMIT 없는 대량 SELECT (sync 제외)"
  - "DB 접속 정보를 산출물에 평문 기록"
  - "DB 조회 결과를 별도 파일로 저장 (sync의 convention 캐시 제외)"
