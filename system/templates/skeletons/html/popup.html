<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- 팝업 화면: topTitleButtonFragment 사용 금지 -->

<div class="data-modal" th:id="|${PGM}dataModal|">
    <div class="modal-content">
        <div th:id="|${PGM}postForm|"></div>
        <!-- TODO: 그리드 필요 시 아래 주석 해제
        <div th:id="|${PGM}toolbar1|"></div>
        <div class="data-grid" th:id="|${PGM}grid1|"></div>
        -->
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-save" th:id="|${PGM}btnOk|">확인</button>
        <button type="button" class="btn btn-cancel" th:id="|${PGM}btnCancel|">취소</button>
    </div>
</div>

<script type="text/javascript" th:inline="javascript">
    (() => {
        const PGM = /*[[${PGM}]]*/ null;
        const listener = platform.listener[PGM];

        let modalParam = null;

        // ──────────────────────────────────────
        // 폼 생성
        // ──────────────────────────────────────
        const createPostForm = () => {
            listener.form.postForm = webix.ui({
                container: `${PGM}postForm`,
                view: 'dataForm',
                pgm: PGM,
                elements: [
                    {
                        cols: [
                            /* TODO: 팝업 필드 정의
                            { view: DATA_VIEW.text, label: '필드명', name: 'field_nm', required: true },
                            { view: DATA_VIEW.codeNone, type: DATA_CODE_TYPE.codeValue, label: '코드명',
                              name: 'code_cd', param: { wrk_tp_cd: 'XX', cd_tp_cd: 'YYY' } },
                            */
                        ],
                    },
                ],
            });
        };

        /* TODO: 그리드 필요 시
        const createToolbarsAndGrids = () => {
            listener.toolbar.toolbar1 = webix.ui({
                container: `${PGM}toolbar1`,
                view: "dataToolbar", pgm: PGM, title: '목록',
            });
            listener.grid.grid1 = webix.ui({
                container: `${PGM}grid1`,
                view: "datagrid", listener: listener,
                editable: false, checkable: false,
                columns: [],
            });
        };
        */

        // ──────────────────────────────────────
        // 확인 버튼
        // ──────────────────────────────────────
        const onOkClick = () => {
            if (!listener.form.postForm.formValidate()) return;

            const data = listener.form.postForm.getData();
            /* TODO: 확인 시 처리 로직
            popup.confirm.show('저장 하시겠습니까?', (result) => {
                if (!result) return;
                let param = listener.form.postForm.getData();
                param.statement = "namespace.saveStatement";
                platform.post(platform.url.save, param, new Callback((res) => {
                    if (res.resultCode === RESULT_CODE.OK) {
                        popup.alert.show('저장되었습니다.');
                    }
                }));
            });
            */
        };

        // ──────────────────────────────────────
        // 취소 버튼
        // ──────────────────────────────────────
        const onCancelClick = () => {
            APP_PGM.closePgm(PGM);
        };

        // ──────────────────────────────────────
        // Assign Handlers
        // ──────────────────────────────────────
        listener.initPgm = () => {
            createPostForm();
            /* TODO: createToolbarsAndGrids(); */

            /* 팝업 파라미터 수신 */
            modalParam = APP_PGM.getOpenParam(PGM);
            if (modalParam) {
                listener.form.postForm.setData(modalParam);
            }
        };

        listener.activePgm = () => {};

        /* 버튼 이벤트 바인딩 */
        document.getElementById(`${PGM}btnOk`)?.addEventListener('click', onOkClick);
        document.getElementById(`${PGM}btnCancel`)?.addEventListener('click', onCancelClick);
    })();
</script>
</html>
