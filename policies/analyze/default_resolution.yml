version: "1.0"
scope: instruct
resolution_priority:
  1: "DDL Grep 결과"
  2: "코드정의서 Grep 결과"
  3: "화면유형 표준 패턴"
  4: "업무 일반 규칙"
  5: "기본값 (guide/defaults/)"
rules:
  - id: DR-001
    description: "보완 우선순위 준수"
    condition: "missing spec field"
    action: "resolve in priority order 1-5"
    severity: critical
  - id: DR-002
    description: "보완 불가 항목 마킹"
    condition: "cannot resolve after all priorities"
    action: "tag [작업자 확인 필요], set manual_required: true"
    severity: critical
  - id: DR-003
    description: "보완 항목 태그 부착"
    condition: "field resolved by system"
    action: "tag with [추론/보완 항목] or [기본값 적용]"
    severity: warning
